# Add the following server block to your nginx configuration file 
# (e.g., /etc/nginx/sites-available/bursara.conf) on the vps 
# to set up a reverse proxy for your application running on localhost:8001. 
# Make sure to replace the server_name and SSL certificate paths with your 
#actual domain and certificate locations.

server {
    server_name chowlin.com.ng www.chowlin.com.ng;

    location / {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/chowlin.com.ng/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chowlin.com.ng/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = chowlin.com.ng) { return 301 https://$host$request_uri; }
    if ($host = www.chowlin.com.ng) { return 301 https://$host$request_uri; }
    listen 80;
    server_name chowlin.com.ng www.chowlin.com.ng;
    return 404;
}